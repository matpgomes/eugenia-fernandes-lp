<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="/logo.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eugenia Fernandes | Estética & Makeup em Lisboa</title>
    <meta name="description" content="Estética facial, corporal e maquilhagem profissional em Lisboa. Design de sobrancelha, Radiofrequência Indiba, Dermaplaning e mais. Agende pelo WhatsApp." />
    <link rel="canonical" href="https://eugeniafernandes.pt" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Eugenia Fernandes | Estética & Makeup" />
    <meta property="og:description" content="Tratamentos de estética e maquilhagem profissional em Lisboa. Resultados visíveis." />
    <meta property="og:url" content="https://eugeniafernandes.pt" />
    <meta property="og:image" content="https://eugeniafernandes.pt/logo.webp" />
    <meta property="og:locale" content="pt_PT" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Eugenia Fernandes | Estética & Makeup" />
    <meta name="twitter:description" content="Tratamentos de estética e maquilhagem profissional em Lisboa." />

    <!-- JSON-LD: BeautySalon -->
    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BeautySalon",
  "name": "Eugenia Fernandes Estética & Makeup",
  "url": "https://eugeniafernandes.pt",
  "telephone": "+351XXXXXXXXX",
  "address": {
    "@type": "PostalAddress",
    "streetAddress": "Rua XXXXX",
    "addressLocality": "Lisboa",
    "addressCountry": "PT"
  },
  "aggregateRating": {
    "@type": "AggregateRating",
    "ratingValue": "5.0",
    "reviewCount": "50"
  },
  "priceRange": "€€",
  "openingHoursSpecification": {
    "@type": "OpeningHoursSpecification",
    "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],
    "opens": "09:00",
    "closes": "19:00"
  }
}
    </script>

    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "Quanto tempo dura cada sessão?",
      "acceptedAnswer": { "@type": "Answer", "text": "A maioria das sessões dura entre 30 e 60 minutos." }
    },
    {
      "@type": "Question",
      "name": "Os procedimentos são dolorosos?",
      "acceptedAnswer": { "@type": "Answer", "text": "Não. Utilizamos técnicas suaves e equipamentos de última geração." }
    },
    {
      "@type": "Question",
      "name": "Quantas sessões são necessárias?",
      "acceptedAnswer": { "@type": "Answer", "text": "Em geral, recomendamos entre 4 a 8 sessões para resultados ótimos." }
    }
  ]
}
    </script>

    <!-- Scroll Reset (before React) -->
    <script>
      if (typeof window !== 'undefined') {
        window.history.scrollRestoration = 'manual';
        window.scrollTo(0, 0);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
